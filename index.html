<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - M70S+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { height: 480px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="cards"></div>

    <!-- Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">30 day - SATS/bbl & SATS/MMBtu (Oil & Mining on Nat Gas)</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71325;

    let chartInstance = null;
    let lastOilUpdate = 0;

    let previousValues = {
      "WTI_USD": 94,
      "NATURAL_GAS_USD": 3.5
    };

    // MicroBT M70S+ specs
    const M70S_HASH = 244;        // TH/s
    const M70S_POWER_KW = 3.14;   // kW (3140 W)

    async function getBTC() {
      try {
        let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
        if (!res.ok) {
          const proxyUrl = `https://corsproxy.io/?${encodeURIComponent("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd")}`;
          res = await fetch(proxyUrl);
        }
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = data.bitcoin.usd;
        }
      } catch (e) {
        console.warn("BTC fetch failed, using last known price");
      }
    }

    async function getCurrentOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.price) {
            const price = parseFloat(json.data.price);
            previousValues[code] = price;
            return price;
          }
        }
      } catch (e) {}
      return previousValues[code] || (code.includes("GAS") ? 3.5 : 93);
    }

    async function getPastMonthPrices(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/past_month?by_code=${code}&interval=1d`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.prices) {
            return json.data.prices.map(item => ({
              date: new Date(item.date),
              price: parseFloat(item.price)
            })).reverse();
          }
        }
      } catch (e) {}
      return [];
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    // Daily sats mined by one M70S+ (network-dependent via BTC price, but approx using current revenue logic)
    function dailySatsMined() {
      // Rough daily BTC mined per TH/s (simplified - real calc needs difficulty, but for this dashboard we use proportional to BTC price)
      // This is a placeholder that scales with BTC price. For more accuracy you'd need network hashrate + difficulty.
      const dailyBtcPerTH = 0.00000035; // approximate daily BTC per TH/s at current conditions (adjust if needed)
      const dailyBtc = M70S_HASH * dailyBtcPerTH;
      return Math.round(dailyBtc * 100000000);
    }

    // Sats mined per MMBtu (when power costs $1 per MMBtu)
    function satsPerMMBtu(ngPriceUsd) {
      const dailyKwh = M70S_POWER_KW * 24;
      const kwhPerMMBtu = 293.071;
      const mmbtuPerDay = dailyKwh / kwhPerMMBtu;

      // Cost per day at $1/MMBtu = mmbtuPerDay dollars
      const dailySats = dailySatsMined();
      return Math.round(dailySats / mmbtuPerDay);
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    function formatUSD(num) {
      return num.toFixed(2);
    }

    function createWidgets() {
      const items = [
        { code: "WTI_USD", label: "WTI", color: "emerald", unit: "SATS / bbl" },
        { code: "NATURAL_GAS_USD", label: "Nat Gas", color: "amber", unit: "SATS / mmbtu" },
        { code: "M70S_MINING", label: "M70S+", color: "sky", unit: "SATS / MMBtu" }  // New widget
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        let sats = 0;
        let usdPrice = 0;
        let displayUnit = item.unit;

        if (item.code === "M70S_MINING") {
          usdPrice = previousValues["NATURAL_GAS_USD"];
          sats = satsPerMMBtu(usdPrice);
        } else {
          usdPrice = previousValues[item.code];
          sats = satsPerBbl(usdPrice);
        }

        const card = document.createElement("div");
        card.className = `bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${item.color}-400 transition-all group relative cursor-help`;
        card.title = item.code === "M70S_MINING" 
          ? `M70S+ (244 TH/s @ 3.14 kW) | BTC: $${btcPrice.toLocaleString()} | Nat Gas: $${formatUSD(usdPrice)} / mmbtu`
          : `BTC: $${btcPrice.toLocaleString()} | ${item.label}: $${formatUSD(usdPrice)} / ${item.code.includes("GAS") ? "mmbtu" : "bbl"}`;

        card.innerHTML = `
          <div class="uppercase tracking-widest text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="sats-${item.code}" class="mt-6 price font-mono font-semibold text-white">${formatNumber(sats)}</div>
          <div class="text-xs text-gray-400 mt-1">${displayUnit}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateWidgets() {
      await getBTC();

      const now = Date.now();
      const shouldUpdateOil = (now - lastOilUpdate) > 300000;

      const items = [
        { code: "WTI_USD" },
        { code: "NATURAL_GAS_USD" },
        { code: "M70S_MINING" }
      ];

      for (const item of items) {
        let usdPrice = 0;
        let sats = 0;

        if (item.code === "M70S_MINING") {
          usdPrice = shouldUpdateOil ? await getCurrentOilPrice("NATURAL_GAS_USD") : previousValues["NATURAL_GAS_USD"];
          sats = satsPerMMBtu(usdPrice);
        } else {
          usdPrice = shouldUpdateOil ? await getCurrentOilPrice(item.code) : previousValues[item.code];
          sats = satsPerBbl(usdPrice);
        }

        const satsEl = document.getElementById(`sats-${item.code}`);
        if (satsEl) satsEl.textContent = formatNumber(sats);

        // Update tooltip
        const card = satsEl ? satsEl.closest('div[title]') : null;
        if (card) {
          if (item.code === "M70S_MINING") {
            card.title = `M70S+ (244 TH/s @ 3.14 kW) | BTC: $${btcPrice.toLocaleString()} | Nat Gas: $${formatUSD(usdPrice)} / mmbtu`;
          } else {
            const unit = item.code.includes("GAS") ? "mmbtu" : "bbl";
            card.title = `BTC: $${btcPrice.toLocaleString()} | ${item.code === "WTI_USD" ? "WTI" : "Nat Gas"}: $${formatUSD(usdPrice)} / ${unit}`;
          }
        }
      }

      if (shouldUpdateOil) lastOilUpdate = now;
    }

    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      const [wtiHistory, ngHistory] = await Promise.all([
        getPastMonthPrices("WTI_USD"),
        getPastMonthPrices("NATURAL_GAS_USD")
      ]);

      let labels = [];
      let wtiSats = [], ngSats = [], miningSats = [];

      if (wtiHistory.length > 0) {
        labels = wtiHistory.map(h => {
          const d = h.date;
          return isNaN(d.getTime()) ? '' : `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        });

        wtiSats = wtiHistory.map(h => satsPerBbl(h.price));
        ngSats = ngHistory.map(h => satsPerBbl(h.price));
        miningSats = ngHistory.map(h => satsPerMMBtu(h.price));
      }

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { 
              label: 'WTI (SATS/bbl)', 
              data: wtiSats, 
              borderColor: '#10b981', 
              backgroundColor: 'rgba(16, 185, 129, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              yAxisID: 'y'
            },
            { 
              label: 'Natural Gas (SATS/mmbtu)', 
              data: ngSats, 
              borderColor: '#f59e0b', 
              backgroundColor: 'rgba(245, 158, 11, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              yAxisID: 'y1'
            },
            { 
              label: 'M70S+ Mining (SATS/MMBtu)', 
              data: miningSats, 
              borderColor: '#38bdf8', 
              backgroundColor: 'rgba(56, 189, 248, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'category',
              grid: { color: '#333' },
              ticks: { color: '#888', maxTicksLimit: 8, maxRotation: 45, minRotation: 45 }
            },
            y: {
              type: 'linear',
              position: 'left',
              grid: { color: '#333' },
              ticks: { color: '#888', callback: v => v.toLocaleString() },
              title: { display: true, text: 'SATS / bbl', color: '#10b981', font: { size: 13 } }
            },
            y1: {
              type: 'linear',
              position: 'right',
              grid: { drawOnChartArea: false },
              ticks: { color: '#888', callback: v => v.toLocaleString() },
              title: { display: true, text: 'SATS / mmbtu', color: '#f59e0b', font: { size: 13 } }
            }
          },
          plugins: {
            legend: { 
              position: 'top', 
              labels: { color: '#ddd', font: { size: 14 }, padding: 20, usePointStyle: true } 
            },
            tooltip: {
              callbacks: {
                title: (tooltipItems) => tooltipItems[0].label,  // YYYY/MM/DD
                label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString()
              }
            }
          }
        }
      });
    }

    async function init() {
      createWidgets();
      await updateWidgets();
      await renderChart();
    }

    init();

    // Updates
    setInterval(() => updateWidgets(), 30000);
    setInterval(async () => {
      await updateWidgets();
      await renderChart();
    }, 300000);
  </script>
</body>
</html>
