<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - M70S+ Own Gas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.4rem; line-height: 1; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6" id="cards"></div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71325;

    let lastOilUpdate = 0;

    let previousValues = {
      "WTI_USD": 94,
      "NATURAL_GAS_USD": 3.5
    };

    // Mining Setup for 20 e³m³/d (20,000 m³/day)
    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;     // TH/s per unit
    const M70S_POWER_KW = 3.14;    // kW per unit

    const CORS_PROXY = "https://corsproxy.io/?";

    function getProxiedUrl(url) {
      return CORS_PROXY + encodeURIComponent(url);
    }

    function dailySatsMinedPerUnit() {
      const satsPerTHPerDay = 475;
      return Math.round(M70S_HASHRATE * satsPerTHPerDay);
    }

    async function getBTC() {
      try {
        const url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd";
        const res = await fetch(getProxiedUrl(url));
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = data.bitcoin.usd;
        }
      } catch (e) {}
    }

    async function getCurrentOilPrice(code) {
      try {
        const url = `https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`;
        const res = await fetch(getProxiedUrl(url), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.price) {
            const price = parseFloat(json.data.price);
            previousValues[code] = price;
            return price;
          }
        }
      } catch (e) {}
      return previousValues[code] || (code.includes("GAS") ? 3.5 : 93);
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function satsPerMMBtuOwnGas() {
      const dailyKwh = M70S_POWER_KW * 24;
      const kwhPerMMBtu = 293.071;
      const mmbtuPerDay = dailyKwh / kwhPerMMBtu;
      const dailySats = dailySatsMinedPerUnit();
      return Math.round(dailySats / mmbtuPerDay);
    }

    function miningPremium(ngPriceUsd) {
      const ownGasSats = satsPerMMBtuOwnGas();
      const gasSats = satsPerBbl(ngPriceUsd);
      return gasSats > 0 ? (ownGasSats / gasSats).toFixed(1) : "0";
    }

    // Calculations for 20 e³m³/d setup
    function getSetupMetrics() {
      const m3PerDay = GAS_VOLUME_M3_PER_DAY;
      const m3PerMMBtu = 28.3;
      const mmbtuPerDay = m3PerDay / m3PerMMBtu;

      const satsPerMMBtu = satsPerMMBtuOwnGas();
      const totalDailySats = Math.round(satsPerMMBtu * mmbtuPerDay);

      // Initial Investment (realistic 2026 turnkey cost)
      const initialInvestmentUSD = 12000000; // $12 million

      // Daily revenue in USD
      const dailyRevenueUSD = (totalDailySats / 100000000) * btcPrice;

      // Payback
      const paybackDays = Math.round(initialInvestmentUSD / dailyRevenueUSD);
      const paybackMonths = (paybackDays / 30).toFixed(1);

      return {
        totalDailySats,
        initialInvestmentUSD,
        dailyRevenueUSD: Math.round(dailyRevenueUSD),
        paybackMonths
      };
    }

    function formatNumber(num) {
      return (num || 0).toLocaleString('en-US');
    }

    function formatUSD(num) {
      return '$' + num.toLocaleString('en-US');
    }

    function createWidgets() {
      const metrics = getSetupMetrics();

      const items = [
        { 
          code: "WTI_USD", 
          label: "WTI", 
          color: "emerald", 
          value: formatNumber(satsPerBbl(previousValues["WTI_USD"] || 94)),
          unit: "SATS / bbl" 
        },
        { 
          code: "NATURAL_GAS_USD", 
          label: "Nat Gas", 
          color: "amber", 
          value: formatNumber(satsPerBbl(previousValues["NATURAL_GAS_USD"])),
          unit: "SATS / MMBtu" 
        },
        { 
          code: "M70S_OWN", 
          label: "M70S+ Own Gas", 
          color: "sky", 
          value: formatNumber(satsPerMMBtuOwnGas()),
          unit: "SATS / MMBtu (free gas)" 
        },
        { 
          code: "PREMIUM", 
          label: "Mining Premium", 
          color: "violet", 
          value: miningPremium(previousValues["NATURAL_GAS_USD"]),
          unit: "× vs Selling Gas" 
        },
        { 
          code: "DAILY_SATS", 
          label: "Daily Sats", 
          color: "cyan", 
          value: formatNumber(metrics.totalDailySats),
          unit: "SATS / DAY (20 e³m³/d)" 
        },
        { 
          code: "INVESTMENT", 
          label: "Initial Investment", 
          color: "rose", 
          value: formatUSD(metrics.initialInvestmentUSD),
          unit: "for 20 e³m³/d" 
        },
        { 
          code: "PAYBACK", 
          label: "Payback Period", 
          color: "lime", 
          value: metrics.paybackMonths + " months",
          unit: "20 e³m³/d Setup" 
        }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${item.color}-400 transition-all group relative cursor-help`;
        card.title = `BTC: $${btcPrice.toLocaleString()} | Using own stranded gas`;

        card.innerHTML = `
          <div class="uppercase tracking-widest text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="mt-6 price font-mono font-semibold text-white">${item.value}</div>
          <div class="text-xs text-gray-400 mt-1">${item.unit}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateWidgets() {
      await getBTC();

      const now = Date.now();
      const shouldUpdateOil = (now - lastOilUpdate) > 300000;

      const ngPrice = shouldUpdateOil ? await getCurrentOilPrice("NATURAL_GAS_USD") : previousValues["NATURAL_GAS_USD"];
      const wtiPrice = shouldUpdateOil ? await getCurrentOilPrice("WTI_USD") : previousValues["WTI_USD"];

      previousValues["NATURAL_GAS_USD"] = ngPrice;
      previousValues["WTI_USD"] = wtiPrice;

      const metrics = getSetupMetrics();

      // Update all values
      const updates = {
        "WTI_USD": formatNumber(satsPerBbl(wtiPrice)),
        "NATURAL_GAS_USD": formatNumber(satsPerBbl(ngPrice)),
        "M70S_OWN": formatNumber(satsPerMMBtuOwnGas()),
        "PREMIUM": miningPremium(ngPrice),
        "DAILY_SATS": formatNumber(metrics.totalDailySats),
        "INVESTMENT": formatUSD(metrics.initialInvestmentUSD),
        "PAYBACK": metrics.paybackMonths + " months"
      };

      Object.keys(updates).forEach(code => {
        const el = document.getElementById(`val-${code}`);
        if (el) el.textContent = updates[code];
      });

      if (shouldUpdateOil) lastOilUpdate = now;
    }

    async function init() {
      createWidgets();
      await updateWidgets();
    }

    init();

    // Live updates
    setInterval(() => updateWidgets(), 30000);
    setInterval(async () => await updateWidgets(), 300000);
  </script>
</body>
</html>
