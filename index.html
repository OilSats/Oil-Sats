<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - AECO + M70S+ (Live)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }

    .widget-value {
      font-size: 2.65rem;
      line-height: 1.05;
      font-weight: 600;
      font-family: monospace;
    }

    @media (max-width: 640px) { .widget-value { font-size: 2.05rem; } }
    @media (min-width: 641px) and (max-width: 1024px) { .widget-value { font-size: 2.35rem; } }

    .widget-card {
      position: relative;
    }

    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      white-space: pre-line;
    }

    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="text-center text-gray-500 text-xs mb-6">
      Version 2026-04-09 • Live Prices • AECO + M70S+ • Power Law R² = 0.96
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>
  </div>

  <script>
    // Persistent last known values
    let btcPrice = 71325;
    let wtiPrice = 94;
    let aecoPrice = 2.80;   // CAD/GJ

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const TOTAL_INVEST_CAD = 20350000;

    const CORS_PROXY = "https://corsproxy.io/?";
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";

    function getProxiedUrl(url) {
      return CORS_PROXY + encodeURIComponent(url);
    }

    async function fetchLivePrices() {
      // BTC
      try {
        const btcRes = await fetch(getProxiedUrl("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"));
        if (btcRes.ok) {
          const data = await btcRes.json();
          if (data.bitcoin?.usd) btcPrice = data.bitcoin.usd;
        }
      } catch (e) {}

      // WTI
      try {
        const wtiRes = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/prices/latest?by_code=WTI_USD`), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (wtiRes.ok) {
          const data = await wtiRes.json();
          if (data.data?.price) wtiPrice = parseFloat(data.data.price);
        }
      } catch (e) {}

      // AECO - trying both common codes
      try {
        let aecoRes = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/prices/latest?by_code=AECO`), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (!aecoRes.ok) {
          aecoRes = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/prices/latest?by_code=AECO_CAD`), {
            headers: { "Authorization": `Token ${OIL_API_KEY}` }
          });
        }
        if (aecoRes.ok) {
          const data = await aecoRes.json();
          if (data.data?.price) aecoPrice = parseFloat(data.data.price);
        }
      } catch (e) {}
    }

    function dailySatsMinedPerUnit(scenario, isPostHalving = false) {
      let base = 475;
      if (scenario === "bear") base = 400;
      if (scenario === "bull") base = 550;
      if (isPostHalving) base = Math.round(base * 0.55);
      return Math.round(M70S_HASHRATE * base);
    }

    function satsPerGJ_AECO() {
      return btcPrice > 0 ? Math.round((aecoPrice / btcPrice) * 100000000) : 0;
    }

    function satsPerGJ_Mining(isPostHalving = false) {
      const dailyKwh = M70S_POWER_KW * 24;
      const kwhPerGJ = 277.8;
      const gjPerDay = dailyKwh / kwhPerGJ;
      const dailySats = dailySatsMinedPerUnit("base", isPostHalving);
      return Math.round(dailySats / gjPerDay);
    }

    function getSetupMetrics(isPostHalving = false) {
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * 0.0353;
      const satsPerGJ = satsPerGJ_Mining(isPostHalving);
      const totalDailySats = Math.round(satsPerGJ * gjPerDay);

      const dailyRevUSD = (totalDailySats / 100000000) * btcPrice;
      const paybackMonths = dailyRevUSD > 0 
        ? ((TOTAL_INVEST_CAD / (dailyRevUSD * 1.39)) / 30).toFixed(1) 
        : "N/A";

      return { totalDailySats, paybackMonths };
    }

    function formatNumber(num) { return (num || 0).toLocaleString('en-US'); }
    function formatCAD(num) { return 'C$' + num.toLocaleString('en-US'); }

    function createWidgets() {
      const bearNow = getSetupMetrics(false);
      const baseNow = getSetupMetrics(false);
      const bullNow = getSetupMetrics(false);

      const bearPost = getSetupMetrics(true);
      const basePost = getSetupMetrics(true);
      const bullPost = getSetupMetrics(true);

      const premium = (satsPerGJ_Mining(false) / satsPerGJ_AECO()).toFixed(1) || "0";

      const items = [
        { code: "WTI", label: "WTI", color: "emerald", 
          value: formatNumber(Math.round((wtiPrice / btcPrice) * 1e8)), 
          unit: "SATS / bbl", 
          tooltip: `WTI: $${wtiPrice.toFixed(2)} / bbl\nBTC: $${btcPrice.toLocaleString()} / BTC` },

        { code: "AECO", label: "AECO Alberta", color: "amber", 
          value: formatNumber(satsPerGJ_AECO()), 
          unit: "SATS / GJ", 
          tooltip: `AECO: C$${aecoPrice.toFixed(2)} / GJ` },

        { code: "MINING", label: "M70S+ Mining Revenue", color: "sky", 
          value: formatNumber(satsPerGJ_Mining(false)), 
          unit: "SATS / GJ", 
          tooltip: "Mining revenue per GJ using own gas" },

        { code: "PREMIUM", label: "Mining Premium", color: "violet", 
          value: premium, 
          unit: "×", 
          tooltip: "Mining vs selling raw AECO gas" },

        { code: "DAILY_NOW", label: "Daily Sats (Now)", color: "cyan", 
          value: `${formatNumber(bearNow.totalDailySats)} / ${formatNumber(baseNow.totalDailySats)} / ${formatNumber(bullNow.totalDailySats)}`, 
          unit: "Bear / Base / Bull", 
          tooltip: "Pre-halving" },

        { code: "PAYBACK", label: "Payback Period", color: "lime", 
          value: `${bearNow.paybackMonths} / ${baseNow.paybackMonths} / ${bullNow.paybackMonths}`, 
          unit: "Bear / Base / Bull (months)", 
          tooltip: `Time to recover C$${TOTAL_INVEST_CAD.toLocaleString()} at $${btcPrice.toLocaleString()} USD/BTC` },

        { code: "DAILY_POST", label: "Daily Sats (Post 2028)", color: "purple", 
          value: `${formatNumber(bearPost.totalDailySats)} / ${formatNumber(basePost.totalDailySats)} / ${formatNumber(bullPost.totalDailySats)}`, 
          unit: "Bear / Base / Bull", 
          tooltip: "After 2028 halving" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all active:scale-[0.985]`;

        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6">${item.value}</div>
          <div class="text-xs text-gray-400 mt-2">${item.unit}</div>
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateDashboard() {
      await fetchLivePrices();
      createWidgets();
    }

    async function init() {
      await updateDashboard();
    }

    init();

    // Update every 5 minutes
    setInterval(updateDashboard, 300000);
  </script>
</body>
</html>
