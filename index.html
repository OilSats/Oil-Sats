<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { max-height: 380px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets at the top -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="cards"></div>

    <!-- Line Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">Last 30 Days — SATS per Barrel</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71500;
    let chartInstance = null;

    async function getBTC() {
      try {
        const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"));
        const proxy = await res.json();
        const data = JSON.parse(proxy.contents);
        btcPrice = data.bitcoin?.usd || 71500;
      } catch(e) {}
    }

    async function getOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}_USD`, {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.price) return parseFloat(json.data.price);
        }
      } catch(e) {}
      const fallbacks = { WTI: 94, BRENT: 96, WCS: 90 };
      return fallbacks[code.toUpperCase()] || 93;
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    async function renderWidgets() {
      await getBTC();

      const oils = [
        { code: "WTI", label: "WTI", color: "emerald" },
        { code: "BRENT", label: "Brent", color: "blue" },
        { code: "WCS", label: "WCS", color: "amber" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      for (const oil of oils) {
        const usdPrice = await getOilPrice(oil.code);
        const sats = satsPerBbl(usdPrice);

        const cardHTML = `
          <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${oil.color}-400 transition-all group relative"
               title="Oil: $${usdPrice.toFixed(2)} | BTC: $${btcPrice.toLocaleString()}">
            <div class="uppercase tracking-widest text-sm font-medium text-${oil.color}-400">${oil.label}</div>
            <div class="mt-6 price font-mono font-semibold text-white">${formatNumber(sats)}</div>
            <div class="text-xs text-gray-400 mt-1">SATS / bbl</div>
          </div>`;
        container.innerHTML += cardHTML;
      }
    }

    // Simple 30-day demo data (replace with real historical fetch later if needed)
    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      // Demo data — last 30 days (you can expand this with real API calls)
      const labels = Array.from({length: 30}, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - (29 - i));
        return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      });

      const wtiData = Array.from({length: 30}, () => 125000 + Math.random() * 18000);
      const brentData = Array.from({length: 30}, () => 128000 + Math.random() * 17000);
      const wcsData = Array.from({length: 30}, () => 118000 + Math.random() * 20000);

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'WTI', data: wtiData, borderColor: '#10b981', tension: 0.3, borderWidth: 3 },
            { label: 'Brent', data: brentData, borderColor: '#3b82f6', tension: 0.3, borderWidth: 3 },
            { label: 'WCS', data: wcsData, borderColor: '#f59e0b', tension: 0.3, borderWidth: 3 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: '#ddd', font: { size: 13 } } },
            tooltip: { mode: 'index', intersect: false }
          },
          scales: {
            y: { grid: { color: '#333' }, ticks: { color: '#888', callback: v => v.toLocaleString() } },
            x: { grid: { color: '#333' }, ticks: { color: '#888' } }
          }
        }
      });
    }

    async function init() {
      await renderWidgets();
      renderChart();
    }

    // Auto-refresh widgets every 60 seconds (chart stays static for now)
    init();
    setInterval(renderWidgets, 60000);
  </script>
</body>
</html>
