<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { height: 520px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="cards"></div>

    <!-- Taller Historical Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">Last 30 Days — SATS per Barrel</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71500;
    let chartInstance = null;

    // Reliable BTC fetch (corsproxy.io is much more stable than allorigins)
    async function getBTC() {
      try {
        const coingeckoUrl = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd";
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(coingeckoUrl)}`;
        
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error("Proxy failed");
        
        const data = await res.json();
        btcPrice = data.bitcoin?.usd || btcPrice;
        return btcPrice;
      } catch (e) {
        console.warn("BTC fetch failed, using cached price:", btcPrice);
        return btcPrice;
      }
    }

    async function getCurrentOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });

        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.price) {
            return parseFloat(json.data.price);
          }
        }
      } catch (e) {
        console.warn(`Current price fetch failed for ${code}`);
      }

      // Fallbacks
      const fallbacks = { WTI_USD: 94, BRENT_CRUDE_USD: 96, WCS_CRUDE_USD: 90 };
      return fallbacks[code] || 93;
    }

    async function getPastMonthPrices(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/past_month?by_code=${code}&interval=1d`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });

        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.prices) {
            return json.data.prices.map(item => ({
              date: new Date(item.date),
              price: parseFloat(item.price)
            })).reverse();
          }
        }
      } catch (e) {
        console.warn(`Historical fetch failed for ${code}`);
      }
      return [];
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    // Build widget cards ONCE on first load
    function createWidgets() {
      const oils = [
        { code: "WTI_USD",       label: "WTI",    color: "emerald" },
        { code: "BRENT_CRUDE_USD", label: "Brent",  color: "blue" },
        { code: "WCS_CRUDE_USD", label: "WCS",    color: "amber" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      oils.forEach(oil => {
        const card = document.createElement("div");
        card.className = `bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${oil.color}-400 transition-all group relative cursor-help`;
        card.title = `Oil: $XX.XX USD/bbl\nBTC: $XX,XXX USD`; // will be updated
        card.innerHTML = `
          <div class="uppercase tracking-widest text-sm font-medium text-${oil.color}-400">${oil.label}</div>
          <div id="sats-${oil.code}" class="mt-6 price font-mono font-semibold text-white">0</div>
          <div class="text-xs text-gray-400 mt-1">SATS / bbl</div>
          <div id="usd-${oil.code}" class="text-sm text-gray-500 mt-4">USD/bbl: $0.00</div>
        `;
        container.appendChild(card);
      });
    }

    // Update only the numbers (this is what prevents disappearing widgets)
    async function updateWidgets() {
      await getBTC();

      const oils = [
        { code: "WTI_USD",       label: "WTI",    color: "emerald" },
        { code: "BRENT_CRUDE_USD", label: "Brent",  color: "blue" },
        { code: "WCS_CRUDE_USD", label: "WCS",    color: "amber" }
      ];

      for (const oil of oils) {
        const usdPrice = await getCurrentOilPrice(oil.code);
        const sats = satsPerBbl(usdPrice);

        // Update SATS
        const satsEl = document.getElementById(`sats-${oil.code}`);
        if (satsEl) satsEl.textContent = formatNumber(sats);

        // Update USD price
        const usdEl = document.getElementById(`usd-${oil.code}`);
        if (usdEl) usdEl.textContent = `USD/bbl: $${usdPrice.toFixed(2)}`;
      }
    }

    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      const [wtiHistory, brentHistory, wcsHistory] = await Promise.all([
        getPastMonthPrices("WTI_USD"),
        getPastMonthPrices("BRENT_CRUDE_USD"),
        getPastMonthPrices("WCS_CRUDE_USD")
      ]);

      const labels = wtiHistory.map(h => h.date.toLocaleDateString('en-US', {month:'short', day:'numeric'}));

      const wtiSats = wtiHistory.map(h => satsPerBbl(h.price));
      const brentSats = brentHistory.map(h => satsPerBbl(h.price));
      const wcsSats = wcsHistory.map(h => satsPerBbl(h.price));

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'WTI',   data: wtiSats,   borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.15)', tension: 0.4, borderWidth: 3.5, pointRadius: 0 },
            { label: 'Brent', data: brentSats, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.15)', tension: 0.4, borderWidth: 3.5, pointRadius: 0 },
            { label: 'WCS',   data: wcsSats,   borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.15)', tension: 0.4, borderWidth: 3.5, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { 
              position: 'top', 
              labels: { color: '#ddd', font: { size: 14 }, padding: 20, usePointStyle: true } 
            },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString() + " SATS/bbl"
              }
            }
          },
          scales: {
            y: { grid: { color: '#333' }, ticks: { color: '#888', callback: v => v.toLocaleString() } },
            x: { grid: { color: '#333' }, ticks: { color: '#888', maxTicksLimit: 12 } }
          }
        }
      });
    }

    async function init() {
      createWidgets();           // Build structure once
      await updateWidgets();     // Fill in the numbers
      await renderChart();       // Render chart
    }

    // Initial load
    init();

    // Update prices every 30 seconds (only numbers change)
    setInterval(updateWidgets, 30000);

    // Refresh chart every 5 minutes
    setInterval(renderChart, 300000);
  </script>
</body>
</html>
