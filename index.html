<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { height: 520px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="cards"></div>

    <!-- Taller Historical Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">Last 30 Days — SATS per Barrel</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71500;
    let chartInstance = null;

    async function getBTC() {
      try {
        const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"));
        const proxy = await res.json();
        const data = JSON.parse(proxy.contents);
        btcPrice = data.bitcoin?.usd || 71500;
      } catch(e) { 
        console.error("BTC fetch failed"); 
      }
    }

    async function getCurrentOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}_USD`, {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.price) return parseFloat(json.data.price);
        }
      } catch(e) {}
      const fallbacks = { WTI: 94, BRENT: 96, WCS: 90 };
      return fallbacks[code.toUpperCase()] || 93;
    }

    async function getPastMonthPrices(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/past_month?by_code=${code}_USD&interval=1d`, {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.prices) {
            return json.data.prices.map(item => ({
              date: new Date(item.date),
              price: parseFloat(item.price)
            })).reverse();
          }
        }
      } catch(e) { console.error(`Historical fetch failed for ${code}`); }
      return [];
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    async function renderWidgets() {
      await getBTC();
      const oils = [
        { code: "WTI", label: "WTI", color: "emerald" },
        { code: "BRENT", label: "Brent", color: "blue" },
        { code: "WCS", label: "WCS", color: "amber" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      for (const oil of oils) {
        const usdPrice = await getCurrentOilPrice(oil.code);
        const sats = satsPerBbl(usdPrice);

        const cardHTML = `
          <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${oil.color}-400 transition-all group relative cursor-help"
               title="Oil: $${usdPrice.toFixed(2)} USD/bbl\nBTC: $${btcPrice.toLocaleString()} USD">
            <div class="uppercase tracking-widest text-sm font-medium text-${oil.color}-400">${oil.label}</div>
            <div class="mt-6 price font-mono font-semibold text-white">${formatNumber(sats)}</div>
            <div class="text-xs text-gray-400 mt-1">SATS / bbl</div>
          </div>`;
        container.innerHTML += cardHTML;
      }
    }

    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      const [wtiHistory, brentHistory, wcsHistory] = await Promise.all([
        getPastMonthPrices("WTI"),
        getPastMonthPrices("BRENT"),
        getPastMonthPrices("WCS")
      ]);

      const labels = wtiHistory.map(h => h.date.toLocaleDateString('en-US', {month:'short', day:'numeric'}));

      const wtiSats = wtiHistory.map(h => satsPerBbl(h.price));
      const brentSats = brentHistory.map(h => satsPerBbl(h.price));
      const wcsSats = wcsHistory.map(h => satsPerBbl(h.price));

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { 
              label: 'WTI', 
              data: wtiSats, 
              borderColor: '#10b981', 
              backgroundColor: 'rgba(16, 185, 129, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              pointRadius: 0
            },
            { 
              label: 'Brent', 
              data: brentSats, 
              borderColor: '#3b82f6', 
              backgroundColor: 'rgba(59, 130, 246, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              pointRadius: 0
            },
            { 
              label: 'WCS', 
              data: wcsSats, 
              borderColor: '#f59e0b', 
              backgroundColor: 'rgba(245, 158, 11, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              pointRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { 
              position: 'top', 
              labels: { color: '#ddd', font: { size: 14 }, padding: 20, usePointStyle: true } 
            },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString() + " SATS/bbl"
              }
            }
          },
          scales: {
            y: { 
              grid: { color: '#333' }, 
              ticks: { color: '#888', callback: v => v.toLocaleString() } 
            },
            x: { 
              grid: { color: '#333' }, 
              ticks: { color: '#888', maxTicksLimit: 12 } 
            }
          }
        }
      });
    }

    async function init() {
      await renderWidgets();
      await renderChart();
    }

    // Initial load
    init();

    // Faster BTC + widget updates: every 30 seconds
    setInterval(renderWidgets, 30000);

    // Chart auto-refreshes every 5 minutes (300000 ms)
    setInterval(renderChart, 300000);
  </script>
</body>
</html>
