<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - AECO + M70S+ (Live)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .widget-value { font-size: 2.65rem; line-height: 1.05; font-weight: 600; font-family: monospace; }
    @media (max-width: 640px) { .widget-value { font-size: 2.05rem; } }

    .widget-card { position: relative; }
    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      white-space: pre-line;
      width: max-content;
      max-width: 320px;
    }
    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .sats-unit { color: #f97316; font-weight: 500; }
    .cad-unit  { color: #f87171; font-weight: 500; }
    .footprint-unit { color: #4ade80; font-weight: 500; }

    .refresh-btn {
      transition: all 0.2s ease;
    }
    .refresh-btn:hover {
      transform: rotate(180deg);
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="flex items-center justify-between mb-2">
      <div class="text-center text-gray-500 text-xs">
        Version 2026-04-09 • Sour Gas Turbines • Conservative Estimates
      </div>
      <button onclick="manualRefresh()" id="refresh-btn"
        class="refresh-btn flex items-center gap-2 text-gray-400 hover:text-white text-xs px-4 py-2 rounded-2xl hover:bg-gray-900 transition-colors">
        <span>↻</span>
        <span>Refresh</span>
      </button>
    </div>

    <div id="last-updated" class="text-center text-gray-500 text-xs mb-6">
      Last updated: never
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>
  </div>

  <script>
    let btcPrice = 71000;
    let wtiPrice = 97;
    let aecoPrice = 1.80;

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;
    const TOTAL_INVEST_CAD = 17800000;

    const SQM_PER_MINER = 0.12;

    const CORS_PROXY = "https://corsproxy.io/?";
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";

    function getProxiedUrl(url) {
      return CORS_PROXY + encodeURIComponent(url);
    }

    async function fetchLivePrices() {
      console.log("=== Fetching live prices ===");

      // BTC
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd", { cache: "no-store" });
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = Math.round(data.bitcoin.usd);
        }
      } catch (e) { console.warn("BTC fetch failed"); }

      // WTI - Primary: Health endpoint (recommended by OilPriceAPI)
      let wtiUpdated = false;
      try {
        const res = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/health`), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const data = await res.json();
          console.log("WTI Health API full response:", data);
          
          const wtiData = data.metrics?.commodity_health?.WTI_USD;
          if (wtiData && wtiData.latest_price) {
            wtiPrice = wtiData.latest_price / 100;   // Convert cents to dollars
            wtiUpdated = true;
            console.log(`✅ WTI updated from health endpoint to: $${wtiPrice.toFixed(2)}`);
          }
        }
      } catch (e) {
        console.warn("Health endpoint WTI fetch failed");
      }

      // Fallback to prices/latest if health fails
      if (!wtiUpdated) {
        try {
          const res = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/prices/latest?by_code=WTI_USD`), {
            headers: { "Authorization": `Token ${OIL_API_KEY}` }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.data?.price) {
              wtiPrice = parseFloat(data.data.price);
              wtiUpdated = true;
              console.log(`✅ WTI updated from prices/latest to: $${wtiPrice.toFixed(2)}`);
            }
          }
        } catch (e) {
          console.warn("Fallback WTI fetch also failed");
        }
      }

      if (!wtiUpdated) {
        console.warn("⚠️ WTI using fallback value ($97)");
      }

      // AECO
      try {
        const codes = ["AECO", "AECO_CAD"];
        for (let code of codes) {
          const res = await fetch(getProxiedUrl(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`), {
            headers: { "Authorization": `Token ${OIL_API_KEY}` }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.data?.price) {
              aecoPrice = parseFloat(data.data.price);
              break;
            }
          }
        }
      } catch (e) { console.warn("AECO fetch failed"); }

      document.getElementById("last-updated").textContent = `Last updated: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }

    function getGasPoweredMetrics() {
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * 0.0353;
      const totalPowerKW = (gjPerDay * 1000) / 277.8;
      const minersSupported = Math.floor(totalPowerKW / M70S_POWER_KW);
      const sqMeters = Math.round(minersSupported * SQM_PER_MINER);
      return { minersSupported, sqMeters };
    }

    function dailySatsMinedPerUnit(scenario, isPostHalving = false) {
      let base = 475;
      if (scenario === "bear") base = 400;
      if (scenario === "bull") base = 550;
      if (isPostHalving) base = Math.round(base * 0.55);
      return Math.round(M70S_HASHRATE * base);
    }

    function satsPerGJ_AECO() {
      return btcPrice > 0 ? Math.round((aecoPrice / btcPrice) * 100000000) : 0;
    }

    function satsPerGJ_Mining(scenario, isPostHalving = false) {
      const dailyKwh = M70S_POWER_KW * 24;
      const gjPerDay = dailyKwh / 277.8;
      const dailySats = dailySatsMinedPerUnit(scenario, isPostHalving);
      return Math.round(dailySats / gjPerDay);
    }

    function getSetupMetrics(scenario, isPostHalving = false) {
      const { minersSupported } = getGasPoweredMetrics();
      const dailySatsPerMiner = dailySatsMinedPerUnit(scenario, isPostHalving);
      const totalDailySats = minersSupported * dailySatsPerMiner;

      const dailyRevUSD = (totalDailySats / 100000000) * btcPrice;
      const paybackMonths = dailyRevUSD > 0 
        ? ((TOTAL_INVEST_CAD / (dailyRevUSD * 1.39)) / 30).toFixed(1) 
        : "N/A";

      return { totalDailySats, paybackMonths };
    }

    function formatNumber(num) { return (num || 0).toLocaleString('en-US'); }
    function formatCAD(num) { return 'C$' + num.toLocaleString('en-US'); }

    function createWidgets() {
      const bearNow = getSetupMetrics("bear", false);
      const baseNow = getSetupMetrics("base", false);
      const bullNow = getSetupMetrics("bull", false);
      const bearPost = getSetupMetrics("bear", true);
      const basePost = getSetupMetrics("base", true);
      const bullPost = getSetupMetrics("bull", true);

      const premium = (satsPerGJ_Mining("base") / satsPerGJ_AECO()).toFixed(1) || "—";
      const { minersSupported, sqMeters } = getGasPoweredMetrics();

      const items = [
        { code: "WTI", label: "WTI", color: "emerald", value: formatNumber(Math.round((wtiPrice / btcPrice) * 1e8)), unit: "SATS / bbl", tooltip: `WTI: $${wtiPrice.toFixed(2)} / bbl\nBTC: $${btcPrice.toLocaleString()} / BTC` },
        { code: "AECO", label: "AECO Alberta", color: "amber", value: formatNumber(satsPerGJ_AECO()), unit: "SATS / GJ", tooltip: `AECO: C$${aecoPrice.toFixed(2)} / GJ` },
        { code: "MINING", label: "M70S+ Mining Revenue", color: "sky", value: formatNumber(satsPerGJ_Mining("base")), unit: "SATS / GJ", tooltip: "Mining revenue per GJ using own gas" },
        { code: "PREMIUM", label: "Mining Premium", color: "violet", value: premium, unit: "×", tooltip: "Mining vs selling raw AECO gas" },

        { code: "DAILY_NOW", label: "Daily Sats (Now)", color: "cyan", 
          value: `${formatNumber(bearNow.totalDailySats)}   ${formatNumber(baseNow.totalDailySats)}   ${formatNumber(bullNow.totalDailySats)}`, 
          unit: `<span class="sats-unit">SATS/day (Bear / Base / Bull)</span>`, 
          tooltip: "Daily sats using 20 e³m³/d • Pre-halving" },

        { code: "DAILY_POST", label: "Daily Sats (Post 2028)", color: "purple", 
          value: `${formatNumber(bearPost.totalDailySats)}   ${formatNumber(basePost.totalDailySats)}   ${formatNumber(bullPost.totalDailySats)}`, 
          unit: `<span class="sats-unit">SATS/day (Bear / Base / Bull)</span>`, 
          tooltip: "Daily sats using 20 e³m³/d • After 2028 halving" },

        { code: "INVESTMENT", label: "Base Investment (Conservative)", color: "rose", 
          value: formatCAD(15800000), 
          unit: `<span class="cad-unit">CAD</span>`, 
          tooltip: `ASICs (809 units)          C$5.3M\nContainers & Racking       C$0.45M\nSour Gas Turbines + Skids  C$3.2M\nElectrical + Switchgear    C$1.8M\nSite Prep + Installation   C$1.6M\nEngineering + Contingency  C$3.45M\n────────────────────────────\nTotal Base                 C$15.8M` },

        { code: "SOUND", label: "Sound Mitigation (Conservative)", color: "rose", 
          value: formatCAD(2000000), 
          unit: `<span class="cad-unit">CAD</span>`, 
          tooltip: "Acoustic enclosures + barriers to ~40-45 dBA\n(Turbines are already quieter than reciprocating gensets)" },

        { code: "TOTAL_INVEST", label: "Total Investment (Conservative)", color: "rose", 
          value: formatCAD(TOTAL_INVEST_CAD), 
          unit: `<span class="cad-unit">CAD</span>`, 
          tooltip: "Base Investment + Sound Mitigation\nReal-world total expected to come in lower" },

        { code: "FOOTPRINT", label: "Physical Footprint", color: "emerald", 
          value: formatNumber(sqMeters), 
          unit: `<span class="footprint-unit">m²</span>`, 
          tooltip: `Space required for ${formatNumber(minersSupported)} M70S+ miners\n(~0.12 m² per miner including racking & airflow)` },

        { code: "PAYBACK", label: "Payback Period", color: "lime", 
          value: `${bearNow.paybackMonths} / ${baseNow.paybackMonths} / ${bullNow.paybackMonths}`, 
          unit: "Bear / Base / Bull (months)", 
          tooltip: `Time to recover C$${TOTAL_INVEST_CAD.toLocaleString()} at $${btcPrice.toLocaleString()} USD/BTC` }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all active:scale-[0.985]`;
        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6">${item.value}</div>
          <div class="text-xs mt-2" id="unit-${item.code}">${item.unit}</div>
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateDashboard() {
      const btn = document.getElementById("refresh-btn");
      btn.style.opacity = "0.5";
      btn.style.pointerEvents = "none";

      await fetchLivePrices();
      createWidgets();

      btn.style.opacity = "1";
      btn.style.pointerEvents = "auto";
      console.log(`Dashboard updated → WTI: $${wtiPrice.toFixed(2)} | AECO: C$${aecoPrice.toFixed(2)} | BTC: $${btcPrice}`);
    }

    function manualRefresh() {
      updateDashboard();
    }

    async function init() {
      await updateDashboard();
    }

    init();
    setInterval(updateDashboard, 300000); // every 5 minutes
  </script>
</body>
</html>
