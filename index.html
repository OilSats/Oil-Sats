<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { height: 480px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10" id="cards"></div>

    <!-- Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">Last 30 Days — SATS per Barrel & per MMBtu</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71500;
    let chartInstance = null;
    let lastOilUpdate = 0;

    async function getBTC() {
      try {
        const coingeckoUrl = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd";
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(coingeckoUrl)}`;
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error();
        const data = await res.json();
        btcPrice = data.bitcoin?.usd || btcPrice;
      } catch (e) {
        console.warn("BTC fetch failed");
      }
    }

    async function getCurrentOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.price) return parseFloat(json.data.price);
        }
      } catch (e) {}
      return code.includes("GAS") ? 3.5 : 93; // fallback
    }

    async function getPastMonthPrices(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/past_month?by_code=${code}&interval=1d`, {
          headers: { 
            "Authorization": `Token ${OIL_API_KEY}`,
            "Content-Type": "application/json"
          }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data && json.data.prices) {
            return json.data.prices.map(item => ({
              date: new Date(item.date),
              price: parseFloat(item.price)
            })).reverse();
          }
        }
      } catch (e) {}
      return [];
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    function createWidgets() {
      const items = [
        { code: "WTI_USD",       label: "WTI",    color: "emerald", unit: "SATS / bbl" },
        { code: "NATURAL_GAS_USD", label: "Nat Gas", color: "amber", unit: "SATS / mmbtu" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${item.color}-400 transition-all group relative cursor-help`;
        card.title = `${item.label} — updates every 5 min`;
        card.innerHTML = `
          <div class="uppercase tracking-widest text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="sats-${item.code}" class="mt-6 price font-mono font-semibold text-white">0</div>
          <div class="text-xs text-gray-400 mt-1">${item.unit}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateWidgets() {
      await getBTC();

      const now = Date.now();
      const shouldUpdateOil = (now - lastOilUpdate) > 300000;

      const items = [
        { code: "WTI_USD",       label: "WTI" },
        { code: "NATURAL_GAS_USD", label: "Nat Gas" }
      ];

      for (const item of items) {
        const usdPrice = shouldUpdateOil ? await getCurrentOilPrice(item.code) : 0;
        const sats = satsPerBbl(usdPrice);

        const satsEl = document.getElementById(`sats-${item.code}`);
        if (satsEl) satsEl.textContent = formatNumber(sats);
      }

      if (shouldUpdateOil) lastOilUpdate = now;
    }

    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      const [wtiHistory, ngHistory] = await Promise.all([
        getPastMonthPrices("WTI_USD"),
        getPastMonthPrices("NATURAL_GAS_USD")
      ]);

      let labels = [];
      let wtiSats = [], ngSats = [];

      if (wtiHistory.length > 0) {
        labels = wtiHistory.map(h => {
          const d = h.date;
          return isNaN(d.getTime()) ? '' : String(d.getDate()).padStart(2, '0');   // Only DD
        });

        wtiSats = wtiHistory.map(h => satsPerBbl(h.price));
        ngSats = ngHistory.map(h => satsPerBbl(h.price));
      }

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { 
              label: 'WTI (SATS/bbl)', 
              data: wtiSats, 
              borderColor: '#10b981', 
              backgroundColor: 'rgba(16, 185, 129, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              yAxisID: 'y'
            },
            { 
              label: 'Natural Gas (SATS/mmbtu)', 
              data: ngSats, 
              borderColor: '#f59e0b', 
              backgroundColor: 'rgba(245, 158, 11, 0.15)',
              tension: 0.4,
              borderWidth: 3.5,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'category',
              grid: { color: '#333' },
              ticks: {
                color: '#888',
                maxTicksLimit: 8,
                maxRotation: 0,
                minRotation: 0
              }
            },
            y: {
              type: 'linear',
              position: 'left',
              grid: { color: '#333' },
              ticks: { color: '#888', callback: v => v.toLocaleString() }
            },
            y1: {
              type: 'linear',
              position: 'right',
              grid: { drawOnChartArea: false },
              ticks: { color: '#888', callback: v => v.toLocaleString() }
            }
          },
          plugins: {
            legend: { 
              position: 'top', 
              labels: { color: '#ddd', font: { size: 14 }, padding: 20, usePointStyle: true } 
            },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString()
              }
            }
          }
        }
      });
    }

    async function init() {
      createWidgets();
      await updateWidgets();
      await renderChart();
    }

    init();

    // BTC updates every 30 seconds
    setInterval(() => updateWidgets(), 30000);

    // Oil + Chart updates every 5 minutes
    setInterval(async () => {
      await updateWidgets();
      await renderChart();
    }, 300000);
  </script>
</body>
</html>
