<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - M70S+ Own Gas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }

    .widget-value {
      font-size: 2.75rem;
      line-height: 1.1;
      font-weight: 600;
      font-family: monospace;
    }

    @media (max-width: 640px) {
      .widget-value { font-size: 2.1rem; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .widget-value { font-size: 2.4rem; }
    }

    /* Custom Tooltip Styles */
    .widget-card {
      position: relative;
    }

    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      white-space: nowrap;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      margin-bottom: 8px;
    }

    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }

    /* Touch support for iPhone */
    @media (hover: none) {
      .widget-card .tooltip {
        visibility: hidden;
      }
      
      .widget-card:active .tooltip {
        visibility: visible;
        opacity: 1;
      }
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71325;

    let lastOilUpdate = 0;

    let previousValues = {
      "WTI_USD": 94,
      "NATURAL_GAS_USD": 3.5
    };

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;

    const CORS_PROXY = "https://corsproxy.io/?";

    function getProxiedUrl(url) {
      return CORS_PROXY + encodeURIComponent(url);
    }

    function dailySatsMinedPerUnit(current = true) {
      const currentSatsPerTH = 475;
      const postHalvingSatsPerTH = Math.round(currentSatsPerTH / 2);
      return Math.round(M70S_HASHRATE * (current ? currentSatsPerTH : postHalvingSatsPerTH));
    }

    async function getBTC() {
      try {
        const url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd";
        const res = await fetch(getProxiedUrl(url));
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = data.bitcoin.usd;
        }
      } catch (e) {}
    }

    async function getCurrentOilPrice(code) {
      try {
        const url = `https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`;
        const res = await fetch(getProxiedUrl(url), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.price) {
            const price = parseFloat(json.data.price);
            previousValues[code] = price;
            return price;
          }
        }
      } catch (e) {}
      return previousValues[code] || (code.includes("GAS") ? 3.5 : 93);
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function satsPerMMBtuOwnGas() {
      const dailyKwh = M70S_POWER_KW * 24;
      const kwhPerMMBtu = 293.071;
      const mmbtuPerDay = dailyKwh / kwhPerMMBtu;
      const dailySats = dailySatsMinedPerUnit(true);
      return Math.round(dailySats / mmbtuPerDay);
    }

    function miningPremium(ngPriceUsd) {
      const ownGasSats = satsPerMMBtuOwnGas();
      const gasSats = satsPerBbl(ngPriceUsd);
      return gasSats > 0 ? (ownGasSats / gasSats).toFixed(1) : "0";
    }

    function getSetupMetrics() {
      const m3PerDay = GAS_VOLUME_M3_PER_DAY;
      const m3PerMMBtu = 28.3;
      const mmbtuPerDay = m3PerDay / m3PerMMBtu;

      const satsPerMMBtu = satsPerMMBtuOwnGas();
      const totalDailySatsNow = Math.round(satsPerMMBtu * mmbtuPerDay);
      const totalDailySatsPostHalving = Math.round((satsPerMMBtu / 2) * mmbtuPerDay);

      const baseCapexUSD = 12000000;
      const soundMitigationUSD = 2800000;
      const totalInvestmentUSD = baseCapexUSD + soundMitigationUSD;

      const dailyRevenueUSD = (totalDailySatsNow / 100000000) * btcPrice;
      const paybackDays = Math.round(totalInvestmentUSD / dailyRevenueUSD);
      const paybackMonths = (paybackDays / 30).toFixed(1);

      return {
        totalDailySatsNow,
        totalDailySatsPostHalving,
        baseInvestment: baseCapexUSD,
        soundMitigation: soundMitigationUSD,
        totalInvestment: totalInvestmentUSD,
        dailyRevenueUSD: Math.round(dailyRevenueUSD),
        paybackMonths
      };
    }

    function formatNumber(num) {
      return (num || 0).toLocaleString('en-US');
    }

    function formatUSD(num) {
      return '$' + num.toLocaleString('en-US');
    }

    function createWidgets() {
      const metrics = getSetupMetrics();

      const items = [
        { code: "WTI_USD", label: "WTI", color: "emerald", value: formatNumber(satsPerBbl(previousValues["WTI_USD"] || 94)), 
          tooltip: `Current BTC Price: $${btcPrice.toLocaleString()}` },
        { code: "NATURAL_GAS_USD", label: "Nat Gas", color: "amber", value: formatNumber(satsPerBbl(previousValues["NATURAL_GAS_USD"])), 
          tooltip: `Value of selling raw natural gas` },
        { code: "M70S_OWN", label: "M70S+ Own Gas", color: "sky", value: formatNumber(satsPerMMBtuOwnGas()), 
          tooltip: `Revenue using own stranded gas (zero marginal gas cost)` },
        { code: "PREMIUM", label: "Mining Premium", color: "violet", value: miningPremium(previousValues["NATURAL_GAS_USD"]), 
          tooltip: `How many times more profitable mining is vs selling gas raw` },
        { code: "DAILY_SATS", label: "Daily Sats (Now)", color: "cyan", value: formatNumber(metrics.totalDailySatsNow), 
          tooltip: `Total Bitcoin sats earned per day from 20,000 m³ gas` },
        { code: "DAILY_SATS_HALVING", label: "Daily Sats (Post 2028)", color: "purple", value: formatNumber(metrics.totalDailySatsPostHalving), 
          tooltip: `Estimated daily sats after the 2028 Bitcoin halving` },
        { code: "INVESTMENT", label: "Base Investment", color: "rose", value: formatUSD(metrics.baseInvestment), 
          tooltip: `$12M for ASICs, generators, and infrastructure` },
        { code: "SOUND", label: "Sound Mitigation", color: "orange", value: formatUSD(metrics.soundMitigation), 
          tooltip: `Cost to reduce noise to ~40 dBA (residential friendly)` },
        { code: "TOTAL_INVEST", label: "Total Investment", color: "red", value: formatUSD(metrics.totalInvestment), 
          tooltip: `Base + Sound Mitigation = $14.8 million` },
        { code: "PAYBACK", label: "Payback Period", color: "lime", value: metrics.paybackMonths + " months", 
          tooltip: `Time to recover total investment at current BTC price` }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all group relative cursor-help active:scale-[0.985]`;

        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6 text-white">${item.value}</div>
          <div class="text-xs text-gray-400 mt-2">${item.unit}</div>
          
          <!-- Custom Tooltip -->
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateWidgets() {
      await getBTC();

      const now = Date.now();
      const shouldUpdateOil = (now - lastOilUpdate) > 300000;

      const ngPrice = shouldUpdateOil ? await getCurrentOilPrice("NATURAL_GAS_USD") : previousValues["NATURAL_GAS_USD"];
      const wtiPrice = shouldUpdateOil ? await getCurrentOilPrice("WTI_USD") : previousValues["WTI_USD"];

      previousValues["NATURAL_GAS_USD"] = ngPrice;
      previousValues["WTI_USD"] = wtiPrice;

      const metrics = getSetupMetrics();

      const updates = {
        "WTI_USD": formatNumber(satsPerBbl(wtiPrice)),
        "NATURAL_GAS_USD": formatNumber(satsPerBbl(ngPrice)),
        "M70S_OWN": formatNumber(satsPerMMBtuOwnGas()),
        "PREMIUM": miningPremium(ngPrice),
        "DAILY_SATS": formatNumber(metrics.totalDailySatsNow),
        "DAILY_SATS_HALVING": formatNumber(metrics.totalDailySatsPostHalving),
        "INVESTMENT": formatUSD(metrics.baseInvestment),
        "SOUND": formatUSD(metrics.soundMitigation),
        "TOTAL_INVEST": formatUSD(metrics.totalInvestment),
        "PAYBACK": metrics.paybackMonths + " months"
      };

      Object.keys(updates).forEach(code => {
        const el = document.getElementById(`val-${code}`);
        if (el) el.textContent = updates[code];
      });

      if (shouldUpdateOil) lastOilUpdate = now;
    }

    async function init() {
      createWidgets();
      await updateWidgets();
    }

    init();

    // Live updates
    setInterval(() => updateWidgets(), 30000);
    setInterval(async () => await updateWidgets(), 300000);
  </script>
</body>
</html>
