<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats Treasury</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.8rem; line-height: 1; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-12 border-b border-gray-800 pb-6">
      <div class="flex items-center gap-4">
        <!-- Reliable Oil Drum + Bitcoin Logo -->
        <img 
          src="https://i.imgur.com/8zK7vL2.png" 
          alt="Oil Sats Logo" 
          class="w-16 h-16 object-contain"
        >
        <h1 class="text-3xl font-semibold tracking-tight">Oil Sats</h1>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <button onclick="refreshAll()" class="flex items-center gap-2 hover:text-amber-400 transition-colors">
          <i class="fa-solid fa-rotate"></i> Refresh
        </button>
      </div>
    </div>

    <!-- Price Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="cards"></div>

    <div class="text-center text-xs text-gray-500 mt-12">
      WTI • Brent • WCS priced in Sats per barrel • Updates every 60s
    </div>
  </div>

  <script>
    const API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";

    let btcPrice = 71450; // safe starting fallback

    async function getBTC() {
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
        const data = await res.json();
        btcPrice = data.bitcoin?.usd || 71450;
      } catch(e) {
        console.error("BTC fetch failed");
      }
    }

    async function getOilPrice(code) {
      try {
        const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}_USD&api_key=${API_KEY}`);
        const json = await res.json();
        // Correct structure from the API
        if (json.data && json.data.price) {
          return { price: parseFloat(json.data.price) };
        }
        throw new Error("No price data");
      } catch(e) {
        console.error(`Oil API failed for ${code}`);
        // Realistic fallbacks
        const fallbacks = { WTI: 72.50, BRENT: 75.80, WCS: 64.20 };
        return { price: fallbacks[code.toUpperCase()] || 70 };
      }
    }

    function satsPerBbl(oilUsd) {
      return Math.round((oilUsd / btcPrice) * 100000000);
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    async function renderCards() {
      await getBTC();
      
      const oils = [
        { code: "WTI", label: "WTI", color: "emerald" },
        { code: "BRENT", label: "Brent", color: "blue" },
        { code: "WCS", label: "WCS", color: "amber" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      for (const oil of oils) {
        const oilData = await getOilPrice(oil.code);
        const usdPrice = oilData.price;
        const sats = satsPerBbl(usdPrice);

        const cardHTML = `
          <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${oil.color}-400 transition-all">
            <div>
              <div class="uppercase tracking-widest text-sm font-medium text-${oil.color}-400">${oil.label}</div>
              <div class="mt-6 price font-mono font-semibold text-white">${formatNumber(sats)}</div>
              <div class="text-xs text-gray-400 mt-1">SATS / bbl</div>
            </div>
            <div class="mt-8 text-xs text-gray-500 flex justify-between">
              <span>Live • Auto-refreshes</span>
              <span class="font-mono">${btcPrice.toLocaleString()} USD/BTC</span>
            </div>
          </div>`;
        container.innerHTML += cardHTML;
      }
    }

    async function refreshAll() {
      await renderCards();
    }

    // Initial load + auto-refresh
    renderCards();
    setInterval(renderCards, 60000);
  </script>
</body>
</html>
