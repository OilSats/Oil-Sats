<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - M70S+ Market Power</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .price { font-size: 3.6rem; line-height: 1; }
    .chart-container { height: 480px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Widgets -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="cards"></div>

    <!-- Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6 text-center">Last 30 Days - SATS/bbl & SATS/MMBtu (Oil vs Mining on Nat Gas at Market Price)</h2>
      <div class="chart-container">
        <canvas id="satsChart"></canvas>
      </div>
    </div>

  </div>

  <script>
    const OIL_API_KEY = "73ed5b5c00864cffaa2cb8233760c7293487d624522af084fddb958fa1a2183a";
    let btcPrice = 71325;

    let chartInstance = null;
    let lastOilUpdate = 0;

    let previousValues = {
      "WTI_USD": 94,
      "NATURAL_GAS_USD": 3.5
    };

    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;

    // CORS proxy for GitHub Pages
    const CORS_PROXY = "https://corsproxy.io/?";

    function getProxiedUrl(url) {
      return CORS_PROXY + encodeURIComponent(url);
    }

    function dailySatsMined() {
      const satsPerTHPerDay = 475;
      return Math.round(M70S_HASHRATE * satsPerTHPerDay);
    }

    async function getBTC() {
      try {
        const url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd";
        const res = await fetch(getProxiedUrl(url));
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = data.bitcoin.usd;
        }
      } catch (e) {
        console.warn("BTC fetch failed - using cached price");
      }
    }

    async function getCurrentOilPrice(code) {
      try {
        const url = `https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`;
        const res = await fetch(getProxiedUrl(url), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.price) {
            const price = parseFloat(json.data.price);
            previousValues[code] = price;
            return price;
          }
        }
      } catch (e) {}
      return previousValues[code] || (code.includes("GAS") ? 3.5 : 93);
    }

    async function getPastMonthPrices(code) {
      try {
        const url = `https://api.oilpriceapi.com/v1/prices/past_month?by_code=${code}&interval=1d`;
        const res = await fetch(getProxiedUrl(url), {
          headers: { "Authorization": `Token ${OIL_API_KEY}` }
        });
        if (res.ok) {
          const json = await res.json();
          if (json.data?.prices) {
            return json.data.prices.map(item => ({
              date: new Date(item.date),
              price: parseFloat(item.price)
            })).reverse();
          }
        }
      } catch (e) {}
      return [];
    }

    function satsPerBbl(oilUsd) {
      return btcPrice > 0 ? Math.round((oilUsd / btcPrice) * 100000000) : 0;
    }

    function satsPerMMBtuNet(ngPriceUsd) {
      const dailyKwh = M70S_POWER_KW * 24;
      const kwhPerMMBtu = 293.071;
      const mmbtuPerDay = dailyKwh / kwhPerMMBtu;

      const dailySatsGross = dailySatsMined();
      const dailyGasCostUsd = mmbtuPerDay * ngPriceUsd;
      const dailySatsGasCost = (dailyGasCostUsd / btcPrice) * 100000000;

      const netDailySats = Math.max(0, dailySatsGross - dailySatsGasCost);
      return Math.round(netDailySats / mmbtuPerDay);
    }

    function miningPremium(ngPriceUsd) {
      const netSats = satsPerMMBtuNet(ngPriceUsd);
      const gasSats = satsPerBbl(ngPriceUsd);
      return gasSats > 0 ? (netSats / gasSats).toFixed(2) : "0.00";
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    function formatUSD(num) {
      return num.toFixed(2);
    }

    function createWidgets() {
      const items = [
        { code: "WTI_USD", label: "WTI", color: "emerald", unit: "SATS / bbl" },
        { code: "NATURAL_GAS_USD", label: "Nat Gas", color: "amber", unit: "SATS / MMBtu" },
        { code: "M70S_NET", label: "M70S+ Net", color: "sky", unit: "Net SATS / MMBtu (after gas cost)" },
        { code: "PREMIUM", label: "Mining Premium", color: "violet", unit: "× vs Selling Gas" }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";

      items.forEach(item => {
        let sats = 0;
        let usdPrice = previousValues["NATURAL_GAS_USD"];

        if (item.code === "WTI_USD") {
          usdPrice = previousValues["WTI_USD"];
          sats = satsPerBbl(usdPrice);
        } else if (item.code === "NATURAL_GAS_USD") {
          sats = satsPerBbl(usdPrice);
        } else if (item.code === "M70S_NET") {
          sats = satsPerMMBtuNet(usdPrice);
        } else if (item.code === "PREMIUM") {
          sats = miningPremium(usdPrice);
        }

        const card = document.createElement("div");
        card.className = `bg-gray-900 border border-gray-800 rounded-3xl p-8 hover:border-${item.color}-400 transition-all group relative cursor-help`;
        
        let tooltip = `BTC: $${btcPrice.toLocaleString()}`;
        if (item.code === "M70S_NET") tooltip += ` | M70S+ (244 TH/s @ 3.14 kW) paying market gas`;
        if (item.code === "PREMIUM") tooltip += ` | How many times better mining is vs selling raw gas`;

        card.title = tooltip;

        card.innerHTML = `
          <div class="uppercase tracking-widest text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="sats-${item.code}" class="mt-6 price font-mono font-semibold text-white">${formatNumber(sats)}</div>
          <div class="text-xs text-gray-400 mt-1">${item.unit}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateWidgets() {
      await getBTC();

      const now = Date.now();
      const shouldUpdateOil = (now - lastOilUpdate) > 300000;

      const ngPrice = shouldUpdateOil ? await getCurrentOilPrice("NATURAL_GAS_USD") : previousValues["NATURAL_GAS_USD"];
      const wtiPrice = shouldUpdateOil ? await getCurrentOilPrice("WTI_USD") : previousValues["WTI_USD"];

      previousValues["NATURAL_GAS_USD"] = ngPrice;
      previousValues["WTI_USD"] = wtiPrice;

      const updates = [
        { code: "WTI_USD", value: satsPerBbl(wtiPrice) },
        { code: "NATURAL_GAS_USD", value: satsPerBbl(ngPrice) },
        { code: "M70S_NET", value: satsPerMMBtuNet(ngPrice) },
        { code: "PREMIUM", value: miningPremium(ngPrice) }
      ];

      updates.forEach(u => {
        const el = document.getElementById(`sats-${u.code}`);
        if (el) el.textContent = formatNumber(u.value);
      });

      if (shouldUpdateOil) lastOilUpdate = now;
    }

    async function renderChart() {
      const ctx = document.getElementById('satsChart');

      const [wtiHistory, ngHistory] = await Promise.all([
        getPastMonthPrices("WTI_USD"),
        getPastMonthPrices("NATURAL_GAS_USD")
      ]);

      let labels = wtiHistory.map(h => {
        const d = h.date;
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      });

      const wtiSats = wtiHistory.map(h => satsPerBbl(h.price));
      const ngSats = ngHistory.map(h => satsPerBbl(h.price));
      const netMiningSats = ngHistory.map(h => satsPerMMBtuNet(h.price));

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'WTI (SATS/bbl)', data: wtiSats, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.15)', tension: 0.4, borderWidth: 3.5, yAxisID: 'y' },
            { label: 'Nat Gas (SATS/MMBtu)', data: ngSats, borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.15)', tension: 0.4, borderWidth: 3.5, yAxisID: 'y1' },
            { label: 'M70S+ Net (SATS/MMBtu after gas cost)', data: netMiningSats, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.15)', tension: 0.4, borderWidth: 3.5, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { grid: { color: '#333' }, ticks: { color: '#888', maxTicksLimit: 8, maxRotation: 45 } },
            y: { position: 'left', grid: { color: '#333' }, ticks: { color: '#888', callback: v => v.toLocaleString() }, title: { display: true, text: 'SATS / bbl', color: '#10b981' } },
            y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#888', callback: v => v.toLocaleString() }, title: { display: true, text: 'SATS / MMBtu', color: '#f59e0b' } }
          },
          plugins: {
            legend: { position: 'top', labels: { color: '#ddd', font: { size: 14 }, usePointStyle: true } },
            tooltip: {
              callbacks: {
                title: (items) => items[0].label,
                label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString()
              }
            }
          }
        }
      });
    }

    async function init() {
      createWidgets();
      await updateWidgets();
      await renderChart();
    }

    init();

    // Updates
    setInterval(() => updateWidgets(), 30000);
    setInterval(async () => {
      await updateWidgets();
      await renderChart();
    }, 300000);
  </script>
</body>
</html>
